name: validate-ecosystem

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate core spec and targets
        shell: pwsh
        run: python ./scripts/build_core_and_targets.py

      - name: Validate core spec targets
        shell: pwsh
        run: python ./scripts/validate_core_spec.py

      - name: Validate ecosystem front matter
        shell: pwsh
        run: ./scripts/validate-ecosystem.ps1

      - name: Validate markdown local links
        shell: pwsh
        run: ./scripts/validate-doc-links.ps1

      - name: Evaluate reliability lab (non-blocking)
        shell: pwsh
        run: python ./scripts/evaluate_reliability_lab.py
        continue-on-error: true
